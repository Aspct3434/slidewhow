<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Slideshow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="slideshow-container" id="slideshow">
    <div class="slide active" data-description="A calm mountain lake at sunrise.">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&h=400&q=80" alt="Mountain Lake" />
    </div>
    <div class="slide" data-description="Night lights of a modern city skyline.">
      <img src="https://images.unsplash.com/photo-1497493292307-31c376b6e479?auto=format&fit=crop&w=800&h=400&q=80" alt="City Skyline" />
    </div>
    <div class="slide" data-description="Footpath through a tranquil green forest.">
      <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&h=400&q=80" alt="Forest Path" />
    </div>
    <a class="prev">&#10094;</a>
    <a class="next">&#10095;</a>
  </div>
  <div id="description" class="description"></div>
  <div class="dots" id="dots"></div>
  <script src="script.js"></script>
</body>
</html>
